<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DevPulse Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 20px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-title {
      font-size: 24px;
      font-weight: bold;
      color: #38bdf8;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .action-btn,
    .info-btn,
    .close-btn,
    .repo-btn {
      background: #38bdf8;
      color: #020617;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    .action-btn:hover,
    .info-btn:hover,
    .close-btn:hover,
    .repo-btn:hover {
      background: #0ea5e9;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(56,189,248,0.2);
      overflow-x: auto;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 0;
      color: #38bdf8;
    }

    .status {
      margin-bottom: 15px;
      color: #94a3b8;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      border-bottom: 1px solid #334155;
      color: #38bdf8;
    }

    tr:hover {
      background: #1e293b;
    }

    .rank {
      font-weight: bold;
      color: #facc15;
    }

    .points {
      font-weight: bold;
      color: #22c55e;
    }

    .error {
      color: #f87171;
      margin-top: 12px;
    }

    .hidden {
      display: none;
    }

    .repo-link {
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }

    .repo-link:hover {
      text-decoration: underline;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #020617;
      width: 95%;
      max-width: 1200px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(56,189,248,0.25);
      padding: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .modal-title {
      color: #38bdf8;
      font-size: 22px;
      font-weight: bold;
    }

    .summary-line {
      color: #94a3b8;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .message-cell {
      max-width: 340px;
      white-space: normal;
      word-break: break-word;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">🚀 DevPulse Dashboard</div>
  <div class="header-actions">
    <button class="action-btn" id="toggleIssuesBtn">Show Issues</button>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>🏆 Developer Points</h2>
    <div class="status" id="leaderboardStatus">Loading developers...</div>
    <table id="leaderboardTable"></table>
    <div class="error" id="leaderboardError"></div>
  </div>

  <div class="card hidden" id="issuesCard">
    <h2>📌 Repository Issues</h2>
    <div class="status" id="issuesStatus">Loading issues...</div>
    <table id="issuesTable"></table>
    <div class="error" id="issuesError"></div>
  </div>
</div>

<div class="modal" id="userModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="userModalTitle">Developer Details</div>
      <button class="close-btn" id="closeUserModalBtn">Close</button>
    </div>
    <div class="summary-line" id="userModalSummary">Loading...</div>
    <table id="userDetailsTable"></table>
    <div class="error" id="userDetailsError"></div>
  </div>
</div>

<div class="modal" id="repoModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="repoModalTitle">Repository Open Issues</div>
      <button class="close-btn" id="closeRepoModalBtn">Close</button>
    </div>
    <div class="summary-line" id="repoModalSummary">Loading...</div>
    <table id="repoIssuesDetailsTable"></table>
    <div class="error" id="repoIssuesDetailsError"></div>
  </div>
</div>

<script>
const BASE_URL = "https://code-space-ezfo.onrender.com";
const LEADERBOARD_API = `${BASE_URL}/leaderboard`;
const USER_DETAILS_API = `${BASE_URL}/user-details`;
const REPO_ISSUES_API = `${BASE_URL}/repo-issues`;
const EXCLUDED_USER = "kushwanth-masupalli";

const toggleIssuesBtn = document.getElementById("toggleIssuesBtn");
const issuesCard = document.getElementById("issuesCard");

const userModal = document.getElementById("userModal");
const closeUserModalBtn = document.getElementById("closeUserModalBtn");

const repoModal = document.getElementById("repoModal");
const closeRepoModalBtn = document.getElementById("closeRepoModalBtn");

let issuesLoaded = false;

function formatDate(value) {
  if (!value) return "-";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString();
}

async function loadLeaderboard() {
  const status = document.getElementById("leaderboardStatus");
  const errorBox = document.getElementById("leaderboardError");
  const table = document.getElementById("leaderboardTable");

  try {
    errorBox.textContent = "";
    status.textContent = "Loading developers...";

    const res = await fetch(LEADERBOARD_API);
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const result = await res.json();
    const rawData = result.leaderboard || [];
    const data = rawData.filter(
      (item) => (item.username || "").toLowerCase() !== EXCLUDED_USER
    );

    status.textContent = `Total developers: ${data.length}`;

    table.innerHTML = `
      <tr>
        <th>Rank</th>
        <th>Developer</th>
        <th>Total Points</th>
        <th>Info</th>
      </tr>
      ${
        data.length === 0
          ? `<tr><td colspan="4">No developers found</td></tr>`
          : data.map((item, index) => `
              <tr>
                <td class="rank">#${index + 1}</td>
                <td>${item.username}</td>
                <td class="points">${item.points}</td>
                <td>
                  <button class="info-btn" onclick="openUserInfo('${item.username}')">Info</button>
                </td>
              </tr>
            `).join("")
      }
    `;
  } catch (err) {
    status.textContent = "Failed to load developers";
    errorBox.textContent = err.message;
  }
}

async function openUserInfo(username) {
  const title = document.getElementById("userModalTitle");
  const summary = document.getElementById("userModalSummary");
  const errorBox = document.getElementById("userDetailsError");
  const table = document.getElementById("userDetailsTable");

  userModal.classList.add("show");
  title.textContent = `How ${username} got the points`;
  summary.textContent = "Loading details...";
  errorBox.textContent = "";
  table.innerHTML = "";

  try {
    const res = await fetch(`${USER_DETAILS_API}/${encodeURIComponent(username)}`);
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const result = await res.json();
    const details = result.details || [];

    summary.textContent = `Total entries: ${result.count} | Total points: ${result.totalPoints}`;

    table.innerHTML = `
      <tr>
        <th>#</th>
        <th>Repo</th>
        <th>From</th>
        <th>Type</th>
        <th>Difficulty</th>
        <th>Message</th>
        <th>Points</th>
        <th>Time</th>
      </tr>
      ${
        details.length === 0
          ? `<tr><td colspan="8">No records found</td></tr>`
          : details.map((item, index) => `
              <tr>
                <td>${index + 1}</td>
                <td>${item.repo || "-"}</td>
                <td>${item.source || "-"}</td>
                <td>${item.type || "-"}</td>
                <td>${item.difficulty || "-"}</td>
                <td class="message-cell">
                  ${
                    item.url
                      ? `<a class="repo-link" href="${item.url}" target="_blank">${item.message || "-"}</a>`
                      : (item.message || "-")
                  }
                </td>
                <td class="points">${item.points ?? 0}</td>
                <td>${formatDate(item.timestamp)}</td>
              </tr>
            `).join("")
      }
    `;
  } catch (err) {
    summary.textContent = "Failed to load user details";
    errorBox.textContent = err.message;
  }
}

async function loadRepoIssuesSummary() {
  const status = document.getElementById("issuesStatus");
  const errorBox = document.getElementById("issuesError");
  const table = document.getElementById("issuesTable");

  try {
    errorBox.textContent = "";
    status.textContent = "Loading issues...";

    const res = await fetch(REPO_ISSUES_API);
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const result = await res.json();
    const repos = result.repos || [];

    status.textContent = `Total repositories: ${result.count}`;

    table.innerHTML = `
      <tr>
        <th>#</th>
        <th>Repository</th>
        <th>Open Issues</th>
        <th>View</th>
      </tr>
      ${
        repos.length === 0
          ? `<tr><td colspan="4">No repositories found</td></tr>`
          : repos.map((repo, index) => `
              <tr>
                <td>${index + 1}</td>
                <td>
                  <a class="repo-link" href="${repo.htmlUrl}" target="_blank">${repo.name}</a>
                </td>
                <td class="points">${repo.openIssues}</td>
                <td>
                  <button class="repo-btn" onclick="openRepoIssues('${repo.name}')">Open</button>
                </td>
              </tr>
            `).join("")
      }
    `;

    issuesLoaded = true;
  } catch (err) {
    status.textContent = "Failed to load issues";
    errorBox.textContent = err.message;
  }
}

async function openRepoIssues(repoName) {
  const title = document.getElementById("repoModalTitle");
  const summary = document.getElementById("repoModalSummary");
  const errorBox = document.getElementById("repoIssuesDetailsError");
  const table = document.getElementById("repoIssuesDetailsTable");

  repoModal.classList.add("show");
  title.textContent = `Open issues for ${repoName}`;
  summary.textContent = "Loading issue details...";
  errorBox.textContent = "";
  table.innerHTML = "";

  try {
    const res = await fetch(`${REPO_ISSUES_API}/${encodeURIComponent(repoName)}`);
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const result = await res.json();
    const issues = result.issues || [];

    summary.textContent = `Open issue count: ${result.count}`;

    table.innerHTML = `
      <tr>
        <th>#</th>
        <th>Issue No</th>
        <th>Title</th>
        <th>Opened By</th>
        <th>Created</th>
        <th>Updated</th>
      </tr>
      ${
        issues.length === 0
          ? `<tr><td colspan="6">No open issues found</td></tr>`
          : issues.map((issue, index) => `
              <tr>
                <td>${index + 1}</td>
                <td>#${issue.number}</td>
                <td class="message-cell">
                  <a class="repo-link" href="${issue.url}" target="_blank">${issue.title}</a>
                </td>
                <td>${issue.user || "-"}</td>
                <td>${formatDate(issue.createdAt)}</td>
                <td>${formatDate(issue.updatedAt)}</td>
              </tr>
            `).join("")
      }
    `;
  } catch (err) {
    summary.textContent = "Failed to load repo issue details";
    errorBox.textContent = err.message;
  }
}

toggleIssuesBtn.addEventListener("click", async () => {
  const hidden = issuesCard.classList.contains("hidden");

  if (hidden) {
    issuesCard.classList.remove("hidden");
    toggleIssuesBtn.textContent = "Hide Issues";

    if (!issuesLoaded) {
      await loadRepoIssuesSummary();
    }
  } else {
    issuesCard.classList.add("hidden");
    toggleIssuesBtn.textContent = "Show Issues";
  }
});

function closeUserModal() {
  userModal.classList.remove("show");
}

function closeRepoModal() {
  repoModal.classList.remove("show");
}

closeUserModalBtn.addEventListener("click", closeUserModal);
closeRepoModalBtn.addEventListener("click", closeRepoModal);

userModal.addEventListener("click", (e) => {
  if (e.target === userModal) {
    closeUserModal();
  }
});

repoModal.addEventListener("click", (e) => {
  if (e.target === repoModal) {
    closeRepoModal();
  }
});

loadLeaderboard();
setInterval(loadLeaderboard, 5000);

window.openUserInfo = openUserInfo;
window.openRepoIssues = openRepoIssues;
</script>

</body>
</html>
